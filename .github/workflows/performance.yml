name: Performance Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        if: github.event_name == 'pull_request'
        uses: fountainhead/action-wait-for-check@v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: deploy-staging
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://stellarlend-staging.vercel.app
            https://stellarlend-staging.vercel.app/lending
            https://stellarlend-staging.vercel.app/dashboard
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'

      - name: Bundle size analysis
        run: |
          npm ci
          npm run build
          npx bundlewatch --config bundlewatch.config.json

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run API load tests
        env:
          BASE_URL: https://stellarlend-staging.vercel.app
        run: |
          mkdir -p performance-results
          k6 run --summary-export performance-results/transactions.json test/load/transactions.k6.js
          k6 run --summary-export performance-results/prices.json test/load/prices.k6.js
          k6 run --summary-export performance-results/tx-submit.json test/load/tx-submit.k6.js

      - name: Upload k6 performance results
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: performance-results/*.json

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            let comment = '## 📊 Performance Report\n\n';
            comment += '✅ Lighthouse CI completed successfully!\n';
            comment += '📦 Bundle size analysis completed!\n';
            comment += '🚀 k6 API load tests completed for `/api/transactions`, `/api/prices`, and `/api/tx/submit`.\n\n';
            comment += 'Check the full report in the Actions tab.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });